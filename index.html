<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votazione Elettronica - Via Briantina 68</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (Excel) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- jsPDF e AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #1e3a8a; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .bg-gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Header Istituzionale con Logo della Scuola -->
    <header class="bg-gradient-header text-white p-6 shadow-xl text-center relative border-b-4 border-yellow-500">
        <div class="container mx-auto flex flex-col items-center justify-center">
            <!-- Logo Scuola SVG -->
            <svg class="w-16 h-16 mb-3 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
            <h1 class="text-3xl font-extrabold tracking-tight uppercase">Scheda per le Votazioni</h1>
            <p class="text-yellow-300 mt-1 font-semibold tracking-wider text-sm md:text-base">VIA BRIANTINA 68, 20831 SEREGNO (MB)</p>
            <p class="text-blue-200 text-xs mt-1">Istituto di Istruzione Secondaria Superiore</p>
        </div>
    </header>

    <!-- Contenuto Principale Dinamico -->
    <main class="flex-grow container mx-auto p-4 md:p-8 w-full max-w-5xl" id="app-container">
        <!-- Riempito via JS -->
    </main>

    <!-- Modal di Notifica Customizzato (Alternativa sicura ad alert) -->
    <div id="custom-alert-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl p-6 shadow-2xl max-w-md w-full mx-4 border border-slate-100 transform scale-95 transition-all">
            <div class="flex items-center space-x-3 mb-4">
                <div id="custom-alert-icon" class="p-2 rounded-full"></div>
                <h3 id="custom-alert-title" class="text-xl font-bold text-slate-900">Notifica</h3>
            </div>
            <p id="custom-alert-message" class="text-slate-600 text-sm mb-6"></p>
            <div class="flex justify-end">
                <button onclick="closeNotification()" class="bg-blue-900 hover:bg-blue-800 text-white font-bold py-2.5 px-6 rounded-xl text-sm shadow transition-colors">
                    Ho capito
                </button>
            </div>
        </div>
    </div>

    <!-- Footer di Conformità Legale -->
    <footer class="bg-slate-900 text-slate-400 p-6 text-center text-xs border-t border-slate-800">
        <div class="container mx-auto space-y-2">
            <p class="font-semibold text-slate-300 text-sm">Sistema Elettorale Blindato Digitale</p>
            <p>Conforme all'Ordinanza Ministeriale n. 215 del 18/12/1991 e s.m.i. • Crittografia End-to-End Monouso</p>
            <div class="pt-3">
                <button onclick="showPage('adminLogin')" class="text-blue-400 hover:text-blue-300 font-bold underline transition-colors">
                    Accesso Riservato Commissione Elettorale
                </button>
            </div>
        </div>
    </footer>

    <!-- Firebase SDK e Logica Applicativa -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, onSnapshot, runTransaction, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDXldnedqfjaihDFXvFixO5KZZNP5SkdE",
            authDomain: "mio-sistema-voto.firebaseapp.com",
            projectId: "mio-sistema-voto",
            storageBucket: "mio-sistema-voto.firebasestorage.app",
            messagingSenderId: "188743609131",
            appId: "1:188743609131:web:da7666758444a40be3336e",
            measurementId: "G-PT9V4V0B3E"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_PWD = "docenti_admin_2024";
        
        let currentUserData = null; 
        let cartVotes = { consiglio: null, consulta: null, classe: null };
        let activeAdminTab = 'config';

        let configElezioni = {
            consultaAttiva: true,
            rappresentantiAttivi: true,
            commissione: [
                "Laura Iavarone",
                "Giuseppe Borzumati",
                "Chiara De Ponti",
                "Rosaria Del Vecchio",
                "Angela Terrana"
            ],
            listeConsiglio: {
                "lista1": { 
                    nome: "Levi ed Oltre", 
                    candidati: ["Pellicano Alfredo", "Colanero Michele", "Diano Alex", "Scanziani Cardoso Pereira Bruna Edoarda"] 
                },
                "lista2": { 
                    nome: "Forever Young - Secondo Capitolo", 
                    candidati: ["Boscolo Riccardo", "Forte Alice Anna", "Giacomet Niccolò", "Cervone Giacomo"] 
                }
            },
            listeConsulta: {
                "lista_unica": {
                    nome: "Make Brianza Great Again",
                    candidati: ["Boscolo Riccardo", "Cervone Giacomo"]
                }
            }
        };

        window.showNotification = function(title, message, type = 'info') {
            const modal = document.getElementById('custom-alert-modal');
            const iconContainer = document.getElementById('custom-alert-icon');
            const titleEl = document.getElementById('custom-alert-title');
            const msgEl = document.getElementById('custom-alert-message');

            titleEl.textContent = title;
            msgEl.textContent = message;

            iconContainer.className = 'p-2 rounded-full ';
            if (type === 'error') {
                iconContainer.className += 'bg-red-100 text-red-600';
                iconContainer.innerHTML = '<i data-lucide="shield-alert" class="w-6 h-6"></i>';
            } else if (type === 'success') {
                iconContainer.className += 'bg-emerald-100 text-emerald-600';
                iconContainer.innerHTML = '<i data-lucide="check-circle-2" class="w-6 h-6"></i>';
            } else {
                iconContainer.className += 'bg-blue-100 text-blue-600';
                iconContainer.innerHTML = '<i data-lucide="info" class="w-6 h-6"></i>';
            }

            modal.classList.remove('hidden');
            lucide.createIcons();
        };

        window.closeNotification = function() {
            document.getElementById('custom-alert-modal').classList.add('hidden');
        };

        async function syncConfigFromDB() {
            try {
                const configRef = doc(db, 'config', 'settings_v2');
                const snap = await getDoc(configRef);
                if (snap.exists()) {
                    configElezioni = snap.data();
                } else {
                    await setDoc(configRef, configElezioni);
                }
            } catch (err) {
                console.error("Errore sinc config:", err);
            }
        }

        async function saveConfigToDB() {
            try {
                const configRef = doc(db, 'config', 'settings_v2');
                await setDoc(configRef, configElezioni);
                showNotification("Successo", "Configurazione elettorale salvata sul database cloud con successo!", "success");
            } catch (err) {
                console.error("Errore salvataggio config:", err);
                showNotification("Errore", "Impossibile salvare la configurazione sul database.", "error");
            }
        }

        window.showPage = function(pageId) {
            const container = document.getElementById('app-container');
            container.innerHTML = '';
            
            switch(pageId) {
                case 'loading': renderLoading(container); break;
                case 'studentLogin': renderStudentLogin(container); break;
                case 'dashboard': renderDashboard(container); break;
                case 'votoConsiglio': renderVotoConsiglio(container); break;
                case 'votoConsulta': renderVotoConsulta(container); break;
                case 'votoClasse': renderVotoClasse(container); break;
                case 'riepilogo': renderRiepilogo(container); break;
                case 'success': renderSuccess(container); break;
                case 'adminLogin': renderAdminLogin(container); break;
                case 'adminPanel': renderAdminPanel(container); break;
            }
            lucide.createIcons();
        };

        function renderLoading(container) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-80">
                    <div class="spinner mb-4"></div>
                    <p class="text-slate-600 font-bold text-lg">Inizializzazione del protocollo di sicurezza...</p>
                </div>
            `;
        }

        function renderStudentLogin(container) {
            container.innerHTML = `
                <div class="grid lg:grid-cols-12 gap-8 items-start">
                    <div class="lg:col-span-7 bg-white p-6 rounded-2xl shadow-md border border-slate-200">
                        <div class="flex items-center space-x-3 mb-4 text-blue-900">
                            <i data-lucide="scale" class="w-6 h-6"></i>
                            <h3 class="text-xl font-bold">Quadro Normativo ed Informativa</h3>
                        </div>
                        <div class="space-y-4 text-sm text-slate-700 leading-relaxed max-h-[480px] overflow-y-auto pr-2">
                            <p class="font-semibold text-slate-900 border-l-4 border-blue-900 pl-3">Ordinanza Ministeriale n. 215 del 18/12/1991</p>
                            <p>Le elezioni degli organi collegiali a livello d'istituto sono disciplinate dalle norme contenute nell'O.M. 215/1991. Il presente sistema garantisce la piena aderenza ai principi di libertà, segretezza ed unicità del voto espressi dall'Art. 48 della Costituzione Italiana.</p>
                            
                            <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 space-y-2">
                                <h4 class="font-bold text-blue-900 flex items-center"><i data-lucide="shield" class="w-4 h-4 mr-1.5"></i> Protocollo Crittografico Monouso:</h4>
                                <p class="text-xs">Ciascun elettore riceve un Token segreto monouso. Una volta inserito nella cabina elettorale digitale, il sistema convalida il diritto di voto. Al momento dell'invio finale nell'urna, il Token viene irrevocabilmente "bruciato" ed eliminato dal database per prevenire il doppio voto.</p>
                            </div>

                            <div class="bg-emerald-50 p-3 rounded-lg border border-emerald-100 space-y-2">
                                <h4 class="font-bold text-emerald-900 flex items-center"><i data-lucide="eye-off" class="w-4 h-4 mr-1.5"></i> Garanzia Assoluta di Anonimato:</h4>
                                <p class="text-xs">La registrazione del voto pubblico (incremento dei contatori delle liste e preferenze) avviene in via asincrona rispetto alla marcatura di utilizzo del Token. Non vi è alcun legame, database log o tracciamento che colleghi l'identità dell'elettore alle scelte di voto espresse.</p>
                            </div>

                            <p class="text-xs text-slate-500 italic">La Commissione Elettorale supervisiona l'integrità del processo. Qualsiasi tentativo di alterazione o accesso non autorizzato sarà registrato e segnalato alle autorità competenti.</p>
                        </div>
                    </div>

                    <div class="lg:col-span-5 bg-white p-8 rounded-2xl shadow-xl border border-slate-200 text-center">
                        <div class="mb-6">
                            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-900">
                                <i data-lucide="door-closed" class="w-8 h-8"></i>
                            </div>
                            <h2 class="text-2xl font-black text-slate-800">Entra in Cabina</h2>
                            <p class="text-slate-500 text-sm mt-1">Digita il codice credenziale segreto ricevuto dal docente.</p>
                        </div>

                        <div class="space-y-4">
                            <input type="text" id="tokenInput" placeholder="ES: AB79Z2" class="w-full p-4 text-center text-3xl font-mono border-2 border-slate-300 rounded-xl uppercase tracking-widest focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none transition-all">
                            
                            <button id="loginBtn" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-extrabold py-4 rounded-xl shadow-lg transition-all text-lg flex items-center justify-center space-x-2">
                                <i data-lucide="key" class="w-5 h-5"></i>
                                <span>Accedi alla Votazione</span>
                            </button>
                            <p id="loginError" class="text-red-600 text-sm font-semibold hidden bg-red-50 p-2.5 rounded-lg border border-red-100"></p>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', handleStudentLogin);
        }

        function renderDashboard(container) {
            if(!currentUserData) return showPage('studentLogin');

            const hasConsiglio = cartVotes.consiglio !== null;
            const hasConsulta = cartVotes.consulta !== null;
            const hasClasse = cartVotes.classe !== null;

            const isAllCompleted = hasConsiglio && 
                                   (!configElezioni.consultaAttiva || hasConsulta) && 
                                   (!configElezioni.rappresentantiAttivi || hasClasse);

            container.innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <span class="bg-blue-100 text-blue-900 font-bold px-3 py-1 rounded-full text-xs uppercase tracking-wider">Elettore Convalidato</span>
                        <h2 class="text-2xl font-black text-slate-800 mt-2">${currentUserData.nome} ${currentUserData.cognome}</h2>
                        <p class="text-slate-600 text-sm font-medium mt-0.5">
                            Classe: <span class="font-bold text-blue-900">${currentUserData.classe} ${currentUserData.sezione}</span> | Indirizzo: <span class="font-bold">${currentUserData.indirizzo || 'Generale'}</span>
                        </p>
                    </div>
                    <div class="flex items-center space-x-2 text-emerald-600 bg-emerald-50 px-4 py-2.5 rounded-xl border border-emerald-100">
                        <i data-lucide="shield-check" class="w-6 h-6"></i>
                        <span class="font-bold text-sm">Sessione Crittografata Attiva</span>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    <!-- CARD 1: Consiglio d'Istituto -->
                    <div class="bg-white rounded-2xl shadow-md border border-slate-200 p-6 flex flex-col justify-between hover:shadow-lg transition-all">
                        <div>
                            <div class="p-3 bg-blue-100 text-blue-900 rounded-xl w-fit mb-4"><i data-lucide="users"></i></div>
                            <h3 class="text-xl font-bold text-slate-900 mb-2">Consiglio d'Istituto</h3>
                            <p class="text-slate-600 text-xs leading-relaxed mb-6">Elezione dei rappresentanti degli studenti nel Consiglio d'Istituto. Puoi esprimere la tua preferenza per una singola lista e fino a 2 preferenze nominali.</p>
                        </div>
                        ${hasConsiglio 
                            ? `<div class="bg-emerald-50 border border-emerald-200 text-emerald-800 font-bold py-3 text-center rounded-xl flex items-center justify-center space-x-1.5"><i data-lucide="check" class="w-5 h-5"></i> <span>Scheda Pronta</span></div>`
                            : `<button onclick="showPage('votoConsiglio')" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-xl shadow transition-colors">Compila Scheda</button>`
                        }
                    </div>

                    <!-- CARD 2: Consulta Provinciale -->
                    ${configElezioni.consultaAttiva ? `
                    <div class="bg-white rounded-2xl shadow-md border border-slate-200 p-6 flex flex-col justify-between hover:shadow-lg transition-all">
                        <div>
                            <div class="p-3 bg-indigo-100 text-indigo-900 rounded-xl w-fit mb-4"><i data-lucide="landmark"></i></div>
                            <h3 class="text-xl font-bold text-slate-900 mb-2">Consulta Provinciale</h3>
                            <p class="text-slate-600 text-xs leading-relaxed mb-6">Elezione dei delegati alla Consulta Provinciale degli Studenti. Seleziona la lista ed esprimi massimo 1 preferenza nominale.</p>
                        </div>
                        ${hasConsulta 
                            ? `<div class="bg-emerald-50 border border-emerald-200 text-emerald-800 font-bold py-3 text-center rounded-xl flex items-center justify-center space-x-1.5"><i data-lucide="check" class="w-5 h-5"></i> <span>Scheda Pronta</span></div>`
                            : `<button onclick="showPage('votoConsulta')" class="w-full bg-indigo-900 hover:bg-indigo-800 text-white font-bold py-3 rounded-xl shadow transition-colors">Compila Scheda</button>`
                        }
                    </div>
                    ` : `
                    <div class="bg-slate-100 rounded-2xl border border-slate-200 p-6 flex flex-col justify-between opacity-60">
                        <div>
                            <div class="p-3 bg-slate-200 text-slate-500 rounded-xl w-fit mb-4"><i data-lucide="eye-off"></i></div>
                            <h3 class="text-xl font-bold text-slate-500 mb-2">Consulta Provinciale</h3>
                            <p class="text-slate-500 text-xs leading-relaxed mb-6">Questa votazione è stata temporaneamente disattivata dalla Commissione Elettorale per la sessione corrente.</p>
                        </div>
                        <div class="bg-slate-200 text-slate-600 font-bold py-3 text-center rounded-xl cursor-not-allowed">Votazione Sospesa</div>
                    </div>
                    `}

                    <!-- CARD 3: Rappresentante di Classe -->
                    ${configElezioni.rappresentantiAttivi ? `
                    <div class="bg-white rounded-2xl shadow-md border border-slate-200 p-6 flex flex-col justify-between hover:shadow-lg transition-all">
                        <div>
                            <div class="p-3 bg-purple-100 text-purple-900 rounded-xl w-fit mb-4"><i data-lucide="user-plus"></i></div>
                            <h3 class="text-xl font-bold text-slate-900 mb-2">Rappresentante di Classe</h3>
                            <p class="text-slate-600 text-xs leading-relaxed mb-6">Esprimi la preferenza per il rappresentante della tua classe inserendo il nominativo del candidato. Il voto rimarrà strettamente legato al verbale di classe.</p>
                        </div>
                        ${hasClasse 
                            ? `<div class="bg-emerald-50 border border-emerald-200 text-emerald-800 font-bold py-3 text-center rounded-xl flex items-center justify-center space-x-1.5"><i data-lucide="check" class="w-5 h-5"></i> <span>Scheda Pronta</span></div>`
                            : `<button onclick="showPage('votoClasse')" class="w-full bg-purple-900 hover:bg-purple-800 text-white font-bold py-3 rounded-xl shadow transition-colors">Compila Scheda</button>`
                        }
                    </div>
                    ` : `
                    <div class="bg-slate-100 rounded-2xl border border-slate-200 p-6 flex flex-col justify-between opacity-60">
                        <div>
                            <div class="p-3 bg-slate-200 text-slate-500 rounded-xl w-fit mb-4"><i data-lucide="eye-off"></i></div>
                            <h3 class="text-xl font-bold text-slate-500 mb-2">Rappresentante di Classe</h3>
                            <p class="text-slate-500 text-xs leading-relaxed mb-6">Questa votazione è stata disattivata o non programmata per questa giornata dalla Commissione Elettorale.</p>
                        </div>
                        <div class="bg-slate-200 text-slate-600 font-bold py-3 text-center rounded-xl cursor-not-allowed">Votazione Sospesa</div>
                    </div>
                    `}
                </div>

                ${isAllCompleted ? `
                    <div class="bg-gradient-to-r from-yellow-50 to-orange-50 border border-yellow-200 rounded-2xl p-6 text-center shadow-lg animate-pulse">
                        <h3 class="text-xl font-black text-amber-900 mb-2">Tutte le schede elettorali sono pronte</h3>
                        <p class="text-amber-800 text-sm mb-4 max-w-xl mx-auto">Procedi al riepilogo finale per convalidare le tue scelte ed inviarle in forma cifrata ed anonima all'urna.</p>
                        <button onclick="showPage('riepilogo')" class="bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-extrabold py-3.5 px-10 rounded-xl shadow-md text-lg transition-transform hover:scale-105 duration-200">
                            Riepilogo e Consegna Voto
                        </button>
                    </div>
                ` : `
                    <div class="bg-slate-100 border border-slate-200 rounded-2xl p-4 text-center text-slate-600 text-sm">
                        <p>Completa tutte le schede elettorali abilitate per poter procedere all'invio dei voti.</p>
                    </div>
                `}
            `;
        }

        function renderVotoConsiglio(container) {
            let html = `
                <div class="mb-6 flex items-center justify-between">
                    <button onclick="showPage('dashboard')" class="text-blue-900 hover:underline flex items-center font-bold text-sm"><i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Torna alla Cabina</button>
                    <span class="text-xs bg-slate-200 px-3 py-1 rounded-full font-bold uppercase tracking-wider text-slate-700">Consiglio d'Istituto</span>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200 mb-6">
                    <div class="border-b pb-4 mb-6">
                        <h2 class="text-2xl font-black text-slate-800">Elezione Consiglio d'Istituto</h2>
                        <p class="text-slate-500 text-sm mt-1">Seleziona la lista elettorale per esprimere il voto di lista. All'interno della stessa lista, puoi esprimere fino a un massimo di 2 preferenze per i candidati.</p>
                    </div>
                    
                    <div class="space-y-6" id="liste-consiglio-container">
            `;

            for (const [idLista, data] of Object.entries(configElezioni.listeConsiglio)) {
                html += `
                    <div class="border rounded-2xl p-5 bg-slate-50 hover:border-blue-400 hover:bg-white transition-all cursor-pointer shadow-sm relative overflow-hidden">
                        <label class="flex items-start cursor-pointer mb-4">
                            <input type="radio" name="listaConsiglio" value="${idLista}" class="mt-1 w-6 h-6 text-blue-900 border-slate-300 focus:ring-blue-900" onchange="updatePrefConsiglio('${idLista}')">
                            <div class="ml-4">
                                <span class="block text-xl font-extrabold text-slate-900">${data.nome}</span>
                                <span class="text-xs text-blue-800 font-bold uppercase tracking-wide">Voto di Lista automatico con selezione</span>
                            </div>
                        </label>
                        <div id="pref-${idLista}" class="ml-10 hidden space-y-3 mt-4 pt-4 border-t border-slate-200">
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Esprimi Preferenze Nominali (Massimo 2):</p>
                            <div class="grid md:grid-cols-2 gap-3">
                                ${data.candidati.map(cand => `

        async function handleStudentLogin() {
            const token = document.getElementById('tokenInput').value.trim().toUpperCase();
            const errEl = document.getElementById('loginError');
            errEl.classList.add('hidden');

            if (!token) { 
                errEl.textContent = "È necessario inserire un Token segreto."; 
                errEl.classList.remove('hidden'); 
                return; 
            }

            try {
                await signInAnonymously(auth);
                const tokenRef = doc(db, 'tokens', token);
                const tokenSnap = await getDoc(tokenRef);

                if (!tokenSnap.exists()) {
                    errEl.textContent = "Token non valido o errato.";
                    errEl.classList.remove('hidden');
                    return;
                }

                const data = tokenSnap.data();
                if (data.hasVoted) {
                    errEl.textContent = "Questo Token Elettorale risulta già utilizzato.";
                    errEl.classList.remove('hidden');
                    return;
                }

                currentUserData = { id: token, ...data };
                showPage('dashboard');

            } catch (error) {
                console.error(error);
                errEl.textContent = "Errore di comunicazione col server. Riprova.";
                errEl.classList.remove('hidden');
            }
        }

        window.submitFinalVotes = async function() {
            if(!cartVotes.consiglio && !cartVotes.consulta && !cartVotes.classe) return;

            const tokenRef = doc(db, 'tokens', currentUserData.id);
            
            let consiglioRef = null;
            if (cartVotes.consiglio) {
                consiglioRef = doc(db, 'voti_consiglio', cartVotes.consiglio.listaId);
            }

            let consultaRef = null;
            if (cartVotes.consulta && configElezioni.consultaAttiva) {
                consultaRef = doc(db, 'voti_consulta', cartVotes.consulta.listaId);
            }

            let classeRef = null;
            const targetClassKey = `${currentUserData.classe}_${currentUserData.sezione}`.toUpperCase();
            if (cartVotes.classe && configElezioni.rappresentantiAttivi) {
                classeRef = doc(db, 'voti_classe', targetClassKey);
            }

            try {
                showPage('loading');
                
                await runTransaction(db, async (transaction) => {
                    const tokenDoc = await transaction.get(tokenRef);
                    if (!tokenDoc.exists() || tokenDoc.data().hasVoted) {
                        throw new Error("Il Token segreto è già stato consumato.");
                    }

                    let consiglioDoc = null;
                    if (consiglioRef) {
                        consiglioDoc = await transaction.get(consiglioRef);
                    }

                    let consultaDoc = null;
                    if (consultaRef) {
                        consultaDoc = await transaction.get(consultaRef);
                    }

                    let classeDoc = null;
                    if (classeRef) {
                        classeDoc = await transaction.get(classeRef);
                    }

                    transaction.update(tokenRef, { hasVoted: true, usedAt: new Date().toISOString() });

                    if (consiglioRef) {
                        let payload = { count: 1, preferenze: {} };
                        if (consiglioDoc && consiglioDoc.exists()) {
                            payload.count = consiglioDoc.data().count + 1;
                            payload.preferenze = consiglioDoc.data().preferenze || {};
                        }
                        
                        cartVotes.consiglio.preferenze.forEach(p => {
                            payload.preferenze[p] = (payload.preferenze[p] || 0) + 1;
                        });
                        
                        transaction.set(consiglioRef, payload, { merge: true });
                    }

                    if (consultaRef) {
                        let payload = { count: 1, preferenze: {} };
                        if (consultaDoc && consultaDoc.exists()) {
                            payload.count = consultaDoc.data().count + 1;
                            payload.preferenze = consultaDoc.data().preferenze || {};
                        }
                        
                        cartVotes.consulta.preferenze.forEach(p => {
                            payload.preferenze[p] = (payload.preferenze[p] || 0) + 1;
                        });
                        
                        transaction.set(consultaRef, payload, { merge: true });
                    }

                    if (classeRef) {
                        let payload = {};
                        if (classeDoc && classeDoc.exists()) {
                            payload = classeDoc.data();
                        }

                        const targetName = cartVotes.classe.toUpperCase();
                        payload[targetName] = (payload[targetName] || 0) + 1;

                        transaction.set(classeRef, payload);
                    }
                });

                currentUserData = null;
                cartVotes = { consiglio: null, consulta: null, classe: null };
                showPage('success');

            } catch (error) {
                console.error("Errore transazione:", error);
                showNotification("Errore di Urna", "Impossibile depositare il voto nell'urna elettronica.", "error");
                showPage('dashboard');
            }
        };

        window.processExcel = function() {
            const fileInput = document.getElementById('excelFile');
            const statusEl = document.getElementById('excelStatus');
            const statusText = document.getElementById('statusText');

            if (!fileInput.files[0]) { 
                showNotification("File Mancante", "Seleziona prima il file Excel compilato.", "error"); 
                return; 
            }

            const btn = document.getElementById('btnProcess');
            btn.disabled = true;
            btn.innerText = "Salvataggio ed elaborazione in corso...";

            const reader = new FileReader();
            reader.onload = async function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const json = XLSX.utils.sheet_to_json(worksheet, {raw: false});

                let batch = writeBatch(db);
                let count = 0;
                let batchCount = 0;

                try {
                    for (let row of json) {
                        let nome = row["Nome"] || row["nome"] || row["NOME"];
                        let cognome = row["Cognome"] || row["cognome"] || row["COGNOME"];
                        let classe = row["Classe"] || row["classe"] || row["CLASSE"];
                        let sezione = row["Sezione"] || row["sezione"] || row["SEZIONE"];
                        let indirizzo = row["Indirizzo"] || row["indirizzo"] || row["INDIRIZZO"];

                        if (nome && cognome && classe && sezione) {
                            const token = Math.random().toString(36).substring(2, 8).toUpperCase();
                            const docRef = doc(db, "tokens", token);
                            
                            batch.set(docRef, {
                                token: token,
                                nome: String(nome).trim(),
                                cognome: String(cognome).trim(),
                                classe: String(classe).trim().toUpperCase(),
                                sezione: String(sezione).trim().toUpperCase(),
                                indirizzo: String(indirizzo || "GENERALE").trim().toUpperCase(),
                                hasVoted: false,
                                createdAt: new Date().toISOString()
                            });

                            count++;
                            batchCount++;

                            if (batchCount === 450) {
                                await batch.commit();
                                batch = writeBatch(db);
                                batchCount = 0;
                            }
                        }
                    }

                    if (batchCount > 0) {
                        await batch.commit();
                    }

                    statusText.innerText = `Protocollo concluso. Caricati con successo ${count} Elettori.`;
                    statusEl.classList.remove('hidden');
                    showNotification("Completato", `Elaborati e registrati con successo ${count} studenti.`, "success");

                } catch (err) {
                    console.error(err);
                    showNotification("Errore", "Si è verificato un errore durante l'importazione massiva batch.", "error");
                }

                btn.disabled = false;
                btn.innerText = "Elabora e Salva in Database";
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        };

        window.generatePDF = async function() {
            try {
                const tokensRef = collection(db, "tokens");
                const querySnapshot = await getDocs(tokensRef);
                
                let students = [];
                querySnapshot.forEach((doc) => {
                    students.push(doc.data());
                });

                if (students.length === 0) {
                    showNotification("Errore di Stampa", "Nessun elettore registrato in database. Carica prima l'elenco.", "error");
                    return;
                }

                const classes = {};
                students.forEach(s => {
                    const key = `${s.classe} ${s.sezione} - ${s.indirizzo}`.trim();
                    if (!classes[key]) classes[key] = [];
                    classes[key].push(s);
                });

                const { jsPDF } = window.jspdf;
                const docPDF = new jsPDF();
                
                let isFirst = true;

                for (const [classTitle, list] of Object.entries(classes)) {
                    if (!isFirst) docPDF.addPage();
                    isFirst = false;

                    docPDF.setFontSize(11);

        window.loadRisultati = async function() {
            const container = document.getElementById('scrutinio-realtime-results');
            container.innerHTML = `<div class="text-center py-10"><div class="spinner inline-block"></div><p class="text-slate-500 font-bold mt-2">Raccolta dati in corso...</p></div>`;

            try {
                const tokSnap = await getDocs(collection(db, "tokens"));
                let totalTokensCount = 0;
                let usedTokensCount = 0;
                let statTurnout = {}; 

                tokSnap.forEach(d => {
                    const data = d.data();
                    totalTokensCount++;
                    if(data.hasVoted) usedTokensCount++;

                    const key = `${data.classe}_${data.sezione}`.toUpperCase();
                    if(!statTurnout[key]) statTurnout[key] = { total: 0, voted: 0 };
                    statTurnout[key].total++;
                    if(data.hasVoted) statTurnout[key].voted++;
                });

                const consSnap = await getDocs(collection(db, "voti_consiglio"));
                let votiConsiglio = {};
                let votiValidiConsiglio = 0;
                consSnap.forEach(d => {
                    votiConsiglio[d.id] = d.data();
                    votiValidiConsiglio += d.data().count || 0;
                });

                const consuSnap = await getDocs(collection(db, "voti_consulta"));
                let votiConsulta = {};
                consuSnap.forEach(d => {
                    votiConsulta[d.id] = d.data();
                });

                const classSnap = await getDocs(collection(db, "voti_classe"));
                let votiClasse = {};
                classSnap.forEach(d => {
                    votiClasse[d.id] = d.data();
                });

                const SEGGI_DISPONIBILI_CONSIGLIO = 4;
                let seggiAssegnatiConsiglio = {};
                let restiConsiglio = [];

                if (votiValidiConsiglio > 0) {
                    const quoziente = votiValidiConsiglio / SEGGI_DISPONIBILI_CONSIGLIO;
                    let seggiRimasti = SEGGI_DISPONIBILI_CONSIGLIO;

                    for (const idLista of Object.keys(configElezioni.listeConsiglio)) {
                        const voti = (votiConsiglio[idLista] && votiConsiglio[idLista].count) ? votiConsiglio[idLista].count : 0;
                        const seggiInteri = Math.floor(voti / quoziente);
                        seggiAssegnatiConsiglio[idLista] = seggiInteri;
                        seggiRimasti -= seggiInteri;

                        restiConsiglio.push({
                            id: idLista,
                            resto: voti - (seggiInteri * quoziente)
                        });
                    }

                    restiConsiglio.sort((a, b) => b.resto - a.resto);
                    for (let i = 0; i < seggiRimasti; i++) {
                        if (restiConsiglio[i]) {
                            seggiAssegnatiConsiglio[restiConsiglio[i].id]++;
                        }
                    }
                }

                globalScrutinioData = {
                    totalTokens: totalTokensCount,
                    usedTokens: usedTokensCount,
                    statTurnout: statTurnout,
                    votiConsiglio: votiConsiglio,
                    votiConsulta: votiConsulta,
                    votiClasse: votiClasse,
                    seggiAssegnatiConsiglio: seggiAssegnatiConsiglio
                };

                let html = `
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="bg-white p-5 rounded-2xl border shadow-sm md:col-span-1 flex flex-col justify-between">
                            <div>
                                <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">Statistiche Affluenza</h4>
                                <div class="space-y-4">
                                    <div class="flex justify-between items-center border-b pb-2">

                                    </div>

                                        <span class="font-extrabold text-blue-900">${usedTokensCount}</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-sm font-semibold text-slate-700">Percentuale Affluenza:</span>
                                        <span class="font-black text-emerald-700">${totalTokensCount > 0 ? ((usedTokensCount / totalTokensCount) * 100).toFixed(2) : '0.00'} %</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-2xl border shadow-sm md:col-span-2">
                            <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 border-b pb-2 flex justify-between">
                                <span>Consiglio d'Istituto</span>
                                <span class="text-blue-900 font-extrabold text-xs">Assegnazione Seggi (O.M. 215/1991)</span>
                            </h4>
                            <div class="space-y-6">
                `;

                for (const [idLista, data] of Object.entries(configElezioni.listeConsiglio)) {
                    const dbData = votiConsiglio[idLista] || { count: 0, preferenze: {} };
                    const seggi = seggiAssegnatiConsiglio[idLista] || 0;

                    const candOrdinati = data.candidati.map(c => ({
                        nome: c,
                        voti: dbData.preferenze[c] || 0
                    })).sort((a, b) => b.voti - a.voti);

                    html += `
                        <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                            <div class="flex justify-between items-center mb-3">
                                <div>
                                    <h5 class="font-extrabold text-slate-900">${data.nome}</h5>
                                    <span class="text-xs text-slate-500 font-bold">Voti di lista: ${dbData.count}</span>
                                </div>
                                <span class="bg-red-100 text-red-900 font-black text-xs px-3 py-1 rounded-full uppercase tracking-wider">Seggi: ${seggi}</span>
                            </div>
                            <ul class="text-xs space-y-1.5 pt-2 border-t border-slate-200">
                                ${candOrdinati.map((c, idx) => {
                                    const eletto = idx < seggi && c.voti > 0 ? '<span class="text-emerald-700 font-bold ml-1.5">[Eletto]</span>' : '';
                                    return `<li class="flex justify-between items-center text-slate-700 border-b border-dashed border-slate-200 pb-1">
                                        <span>${c.nome} ${eletto}</span>
                                        <span class="font-bold text-slate-900">${c.voti} pref.</span>
                                    </li>`;
                                }).join('')}
                            </ul>
                        </div>
                    `;
                }

                html += `
                            </div>
                        </div>
                    </div>

                    ${configElezioni.consultaAttiva ? `
                    <div class="bg-white p-5 rounded-2xl border shadow-sm">
                        <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 border-b pb-2">Consulta Provinciale</h4>
                        <div class="grid md:grid-cols-2 gap-4">
                            ${Object.entries(configElezioni.listeConsulta).map(([idLista, data]) => {
                                const dbData = votiConsulta[idLista] || { count: 0, preferenze: {} };
                                return `
                                    <div class="bg-slate-50 p-4 rounded-xl border border-indigo-100">
                                        <h5 class="font-extrabold text-slate-950">${data.nome}</h5>
                                        <p class="text-xs text-slate-500 mb-2">Voti di Lista Totali: ${dbData.count}</p>
                                        <ul class="text-xs space-y-1 mt-2 border-t pt-2">
                                            ${data.candidati.map(c => `
                                                <li class="flex justify-between">

                        <div class="grid md:grid-cols-3 gap-4">

                                return `

                                        <h5 class="font-extrabold text-slate-900 text-sm border-b pb-1 mb-2">Classe: ${classFormat}</h5>
                                        <ul class="text-xs space-y-1">

        window.esportaExcelCompleto = function() {
            if(!globalScrutinioData) {
                showNotification("Azione Necessaria", "Nessun dato scrutinato disponibile. Premi prima 'Aggiorna Dati'.", "error");
                return;
            }

            try {
                const wb = XLSX.utils.book_new();

                const rowsAffluenza = [
                    ["STATISTICHE GENERALI ELETTORALI"],
                    ["Elettori Iscritti", globalScrutinioData.totalTokens],
                    ["Elettori Votanti", globalScrutinioData.usedTokens],
                    ["Turnout (%)", ((globalScrutinioData.usedTokens / globalScrutinioData.totalTokens) * 100).toFixed(2)],
                    [],
                    ["Affluenza per Classe", "Votanti", "Iscritti", "%"]
                ];

                Object.entries(globalScrutinioData.statTurnout).forEach(([k, item]) => {
                    const rowText = k.replace('_', ' ');
                    const per = ((item.voted / item.total) * 100).toFixed(2);
                    rowsAffluenza.push([rowText, item.voted, item.total, per]);
                });

                const wsAffluenza = XLSX.utils.aoa_to_sheet(rowsAffluenza);
                XLSX.utils.book_append_sheet(wb, wsAffluenza, "Affluenza");

                const rowsConsiglio = [
                    ["RISULTATI CONSIGLIO D'ISTITUTO (O.M. 215/1991)"],
                    ["Lista", "Voti di Lista", "Seggi Assegnati", "Candidato", "Preferenze"]
                ];

                for (const [idLista, data] of Object.entries(configElezioni.listeConsiglio)) {
                    const dbData = globalScrutinioData.votiConsiglio[idLista] || { count: 0, preferenze: {} };
                    const seggi = globalScrutinioData.seggiAssegnatiConsiglio[idLista] || 0;

                    data.candidati.forEach((c, idx) => {
                        const v = dbData.preferenze[c] || 0;
                        if(idx === 0) {
                            rowsConsiglio.push([data.nome, dbData.count, seggi, c, v]);
                        } else {
                            rowsConsiglio.push(["", "", "", c, v]);
                        }
                    });
                }

                const wsConsiglio = XLSX.utils.aoa_to_sheet(rowsConsiglio);
                XLSX.utils.book_append_sheet(wb, wsConsiglio, "Consiglio d'Istituto");

                const rowsConsulta = [
                    ["RISULTATI CONSULTA PROVINCIALE"],
                    ["Lista", "Voti di Lista", "Candidato", "Preferenze"]
                ];

                for (const [idLista, data] of Object.entries(configElezioni.listeConsulta)) {
                    const dbData = globalScrutinioData.votiConsulta[idLista] || { count: 0, preferenze: {} };
                    data.candidati.forEach((c, idx) => {
                        const v = dbData.preferenze[c] || 0;
                        if(idx === 0) {
                            rowsConsulta.push([data.nome, dbData.count, c, v]);
                        } else {
                            rowsConsulta.push(["", "", c, v]);
                        }
                    });
                }

                const wsConsulta = XLSX.utils.aoa_to_sheet(rowsConsulta);
                XLSX.utils.book_append_sheet(wb, wsConsulta, "Consulta Provinciale");

                const rowsRappr = [
                    ["SCRUTINIO RAPPRESENTANTI DI CLASSE"],
                    ["Classe/Sezione", "Studente Votato", "Voti Ricevuti"]
                ];

                Object.entries(globalScrutinioData.votiClasse).forEach(([k, list]) => {
                    const kText = k.replace('_', ' ');
                    Object.entries(list).forEach(([candName, count], idx) => {
                        if(idx === 0) {
                            rowsRappr.push([kText, candName, count]);
                        } else {
                            rowsRappr.push(["", candName, count]);
                        }
                    });
                });

                const wsRappr = XLSX.utils.aoa_to_sheet(rowsRappr);
                XLSX.utils.book_append_sheet(wb, wsRappr, "Rappresentanti di Classe");

                XLSX.writeFile(wb, "Scrutinio_Elettronico_Completo.xlsx");

            } catch (err) {
                console.error(err);
                showNotification("Errore", "Si è verificato un errore durante l'esportazione in Excel.", "error");
            }
        };

                // PAGINA 4+: VERBALI DELLE SINGOLE CLASSI (RAPPRESENTANTI DI CLASSE)
                if (configElezioni.rappresentantiAttivi) {
                    Object.entries(globalScrutinioData.statTurnout).forEach(([classKey, item]) => {
                        const classFormat = classKey.replace('_', ' ');
                        
                        docPDF.addPage();
                        docPDF.setFontSize(14);
                        docPDF.setFont("Helvetica", "bold");
                        docPDF.text("ISTITUTO D'ISTRUZIONE SUPERIORE - VIA BRIANTINA 68 SEREGNO", 14, 20);
                        
                        docPDF.setFontSize(12);
                        docPDF.text(`VERBALE DI CLASSE - RAPPRESENTANTI DI CLASSE: ${classFormat}`, 14, 30);

                        docPDF.setFontSize(9.5);
                        docPDF.setFont("Helvetica", "normal");
                        docPDF.text(`Quadro d'affluenza per la sezione corrente:`, 14, 38);
                        docPDF.text(`- Alunni Iscritti: ${item.total}`, 14, 44);
                        docPDF.text(`- Alunni Votanti effettivi: ${item.voted}`, 14, 49);
                        docPDF.text(`- Percentuale affluenza di classe: ${item.total > 0 ? ((item.voted / item.total) * 100).toFixed(2) : '0.00'} %`, 14, 54);

                        docPDF.setFont("Helvetica", "bold");
                        docPDF.text("Scrutinio interno preferenze Rappresentanti di Classe:", 14, 64);
                        docPDF.setFont("Helvetica", "normal");

                        const classVotesObj = globalScrutinioData.votiClasse[classKey] || {};
                        const sortedCands = Object.entries(classVotesObj).sort((a, b) => b[1] - a[1]);

                        const classTableRows = sortedCands.map(([name, votes], i) => [
                            i + 1,
                            name.toUpperCase(),
                            votes,
                            i === 0 && votes > 0 ? "PRIMO ELETTO" : (i === 1 && votes > 0 ? "SECONDO ELETTO" : "Non eletto / Riserva")
                        ]);

                        if (classTableRows.length === 0) {
                            classTableRows.push(["-", "NESSUNA PREFERENZA ESPRESSA (SCHEDA BIANCA)", "0", "-"]);
                        }

                        docPDF.autoTable({
                            startY: 68,
                            head: [['Pos.', 'Candidato Scritto dagli Studenti', 'Voti Ricevuti', 'Esito']],
                            body: classTableRows,
                            theme: 'grid',
                            headStyles: { fillColor: [147, 51, 234] }, 
                            styles: { fontSize: 8.5 }
                        });

                        let blockY = docPDF.lastAutoTable.finalY + 12;
                        if(blockY > 210) {
                            docPDF.addPage();
                            blockY = 30;
                        }

                        docPDF.setFillColor(248, 250, 252);
                        docPDF.rect(14, blockY, 182, 42, "F");
                        docPDF.setDrawColor(226, 232, 240);
                        docPDF.rect(14, blockY, 182, 42, "D");

                        docPDF.setFontSize(8.5);
                        docPDF.setFont("Helvetica", "bold");
                        docPDF.text("REGISTRO DI GESTIONE PLICO E SEGGIO DI CLASSE (A cura del Coordinatore/Somministratore)", 18, blockY + 6);
                        docPDF.setFont("Helvetica", "normal");
                        
                        docPDF.text("- Orario di ricezione plico contenente i tagliandini: ____ : ____", 18, blockY + 13);
                        docPDF.text("- Orario di effettiva apertura del voto digitale di classe: ____ : ____", 18, blockY + 19);
                        docPDF.text("- Orario di chiusura operazioni di voto e riconsegna: ____ : ____", 18, blockY + 25);
                        
                        docPDF.text("Firma del Docente Somministratore 1: ____________________________", 18, blockY + 33);
                        docPDF.text("Firma del Docente Somministratore 2: ____________________________", 112, blockY + 33);
                    });
                }

                docPDF.save("Verbale_Ufficiale_Elezioni_Completo.pdf");
                showNotification("Esportazione Completata", "Il pacchetto di verbali istituzionale completo (PDF) è stato generato e scaricato correttamente.", "success");

            } catch (err) {
                console.error(err);
                showNotification("Errore", "Si è verificato un errore durante la generazione del Verbale PDF.", "error");
            }
        };

        window.onload = async () => {
            showPage('loading');
            await syncConfigFromDB();
            showPage('studentLogin');
        };
    </script>
</body>
</html>
